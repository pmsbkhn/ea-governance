apiVersion: ea/v1
kind: System
metadata:
  id: marketplace-payment
  repo: marketplace-aigen/payment
spec:
  owner: team-mp-payment
  domain: payment
  pnl: marketplace
  stack: java-msfw
  fitnessFunctions:
    domainIsPure: enforce
    useCaseSliceIsolation: enforce
    aggregateEncapsulation: enforce
    entityEncapsulation: enforce
    stateWritersPublish: enforce
  waivers: []
  notes: "stateWritersPublish uses isAssignableTo (port extensions) — now the lib default."
  runtimeObjectives:
    - id: httpLatencyMax
      query: 'max(http_server_requests_seconds_max{application="payment-service"})'
      threshold: 1.0
      warnAt: 0.5
      unit: s
      driftMin: 0.05
    - id: outboxPendingLag
      query: 'sum(msfw_outbox_pending_events{application="payment-service"})'
      threshold: 500
      warnAt: 100
    - id: outboxParked
      query: 'sum(msfw_outbox_parked_events{application="payment-service"})'
      threshold: 1
      warnAt: 1
  quantum:
    id: payment
