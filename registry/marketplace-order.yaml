apiVersion: ea/v1
kind: System
metadata:
  id: marketplace-order
  repo: marketplace-aigen/order
spec:
  owner: team-mp-order
  domain: order
  pnl: marketplace
  stack: java-msfw
  fitnessFunctions:
    domainIsPure: enforce
    useCaseSliceIsolation: enforce
    aggregateEncapsulation: enforce
    entityEncapsulation: enforce
    stateWritersPublish: enforce
  waivers: []
  notes: "Migrated to shared archrules library (canary)."
  runtimeObjectives:
    - id: httpLatencyMax
      query: 'max(http_server_requests_seconds_max{application="order-service"})'
      threshold: 1.0
      warnAt: 0.5
      unit: s
      driftMin: 0.05
    - id: outboxPendingLag
      query: 'sum(msfw_outbox_pending_events{application="order-service"})'
      threshold: 500
      warnAt: 100
    - id: outboxParked
      query: 'sum(msfw_outbox_parked_events{application="order-service"})'
      threshold: 1
      warnAt: 1
