apiVersion: ea/v1
kind: System
metadata:
  id: marketplace-checkout
  repo: marketplace-aigen/checkout
spec:
  owner: team-mp-checkout
  domain: checkout
  pnl: marketplace
  stack: java-msfw
  fitnessFunctions:
    domainIsPure: enforce
    useCaseSliceIsolation: enforce
    aggregateEncapsulation: enforce
    entityEncapsulation: n/a
    stateWritersPublish: enforce
    quantumSyncBoundary: enforce
  # Architectural quantum: each marketplace service is its own quantum (own DB, async links).
  # Checkout is the one orchestrator with SYNCHRONOUS cross-quantum calls; the architect declares
  # exactly which quanta it may call synchronously — a new sync client to anything else fails the
  # build (quantumSyncBoundary). This makes the quantum decision enforceable, not just documented.
  quantum:
    id: checkout
    allowedSyncQuanta: [catalog, inventory, order, payment]
  waivers: []
  notes: "Value-object-only model: no msfw Entity subtypes (allowEmptyShould)."
  runtimeObjectives:
    - id: httpLatencyMax
      query: 'max(http_server_requests_seconds_max{application="checkout-service"})'
      threshold: 1.0
      warnAt: 0.5
      unit: s
      driftMin: 0.05
    - id: workflowCompensationFailed
      query: 'sum(increase(msfw_workflow_runs_total{application="checkout-service",outcome="compensation_failed"}[1h]))'
      threshold: 1
      warnAt: 1
