apiVersion: ea/v1
kind: System
metadata:
  id: ecommerce-inventory
  repo: ecommerce-msfw/inventory
spec:
  owner: team-ecom-inventory
  domain: inventory
  pnl: ecommerce
  stack: java-msfw
  fitnessFunctions:
    domainIsPure: enforce
    useCaseSliceIsolation: warn  # F-1 waiver
    aggregateEncapsulation: enforce
    entityEncapsulation: enforce
    stateWritersPublish: warn  # F-5 waiver
  waivers:
    - rule: useCaseSliceIsolation
      reason: "goodsflow depends on placeholder.KafkaDirectPublisher (temporary msfw-migration stub)"
      expires: 2026-09-30
      ticket: F-1
    - rule: stateWritersPublish
      reason: "CreateStockReceiptUc + RegisterProductUc write state without @EventPublishHandler"
      expires: 2026-09-30
      ticket: F-5
  notes: "Flat package layout (slices are siblings of domain) → slice rule needs shared-package scoping (F-2)."
