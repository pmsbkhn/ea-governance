apiVersion: ea/v1
kind: System
metadata:
  id: ecommerce-order-management
  repo: ecommerce-msfw/order-management
spec:
  owner: team-ecom-oms
  domain: order
  pnl: ecommerce
  stack: java-msfw
  fitnessFunctions:
    domainIsPure: enforce
    useCaseSliceIsolation: enforce
    aggregateEncapsulation: enforce
    entityEncapsulation: enforce
    stateWritersPublish: warn  # F-4 waiver
  waivers:
    - rule: stateWritersPublish
      reason: "RegisterProductUc writes state but is not @EventPublishHandler (event not via outbox)"
      expires: 2026-09-30
      ticket: F-4
  notes: "Adopting."
