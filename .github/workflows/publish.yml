name: Publish to GitHub Packages

# Publishes the ea-archrules fitness-function library to GitHub Packages.
#  - push a tag like v0.1.0  -> releases that version (pom version set from the tag)
#  - manual run (workflow_dispatch) -> deploys the current pom version, or an override
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0). Leave blank to deploy the current pom version.'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: archrules
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          server-id: github                 # must match <distributionManagement> id in archrules/pom.xml
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          cache: maven

      - name: Resolve release version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        if: steps.ver.outputs.version != ''
        run: mvn -B -ntp versions:set -DnewVersion=${{ steps.ver.outputs.version }} -DgenerateBackupPoms=false

      - name: Build, test and deploy
        run: mvn -B -ntp deploy
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
